services:
  anvika-gateway:
    image: ${ANVIKA_IMAGE:-anvika:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANVIKA_GATEWAY_TOKEN: ${ANVIKA_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ANVIKA_CONFIG_DIR}:/home/node/.anvika
      - ${ANVIKA_WORKSPACE_DIR}:/home/node/.anvika/workspace
    ports:
      - "${ANVIKA_GATEWAY_PORT:-18789}:18789"
      - "${ANVIKA_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ANVIKA_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  anvika-cli:
    image: ${ANVIKA_IMAGE:-anvika:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANVIKA_GATEWAY_TOKEN: ${ANVIKA_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ANVIKA_CONFIG_DIR}:/home/node/.anvika
      - ${ANVIKA_WORKSPACE_DIR}:/home/node/.anvika/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
