services:
  - type: web
    name: anvika
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ANVIKA_STATE_DIR
        value: /data/.anvika
      - key: ANVIKA_WORKSPACE_DIR
        value: /data/workspace
      - key: ANVIKA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: anvika-data
      mountPath: /data
      sizeGB: 1
